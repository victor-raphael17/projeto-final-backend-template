services:
  mysql:
    container_name: mysql
    image: mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    build: .
    image: projeto-final/backend
    env_file:
      - .env
    environment:
      DB_HOST: mysql
    ports:
      - "8000:8000"
    volumes:
      - app_storage:/app/storage
    depends_on:
      - mysql
volumes:
  mysql_data: {}
  app_storage: {}
